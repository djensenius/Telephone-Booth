name: publish-apt
# Regenerates the APT repository on the gh-pages branch every time `publish`
# finishes successfully. The upstream `publish` workflow explicitly dispatches
# this one in its final job (`dispatch-apt`), passing the release tag. This
# explicit chaining is more reliable than `workflow_run`, which only fires
# when the upstream ran on the default branch — and `publish` is normally
# dispatched against the release tag, not `main`. A `workflow_dispatch` is
# kept for manual re-runs (e.g. when retrying a failed APT publish without
# rebuilding the .debs).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)publish to the APT repo (e.g. v0.1.0)."
        required: true
        type: string
      source_repo:
        description: >-
          owner/repo to pull the release .debs from. Defaults to this repo.
          Used so sibling projects (e.g. the operator CLI) can publish their
          .debs into this shared APT repo. Must be under the same owner.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-apt
  cancel-in-progress: false

jobs:
  publish-apt:
    name: publish APT repo
    runs-on: ubuntu-latest
    # production-apt is a protected GitHub Environment that holds the signing
    # key. Restrict its deployment branches to `main` in repo settings.
    environment: production-apt
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_SOURCE_REPO: ${{ inputs.source_repo }}
          DEFAULT_REPO: ${{ github.repository }}
        run: |
          set -eu
          tag="$INPUT_TAG"
          if [ -z "${tag:-}" ] || ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Refusing to publish: tag '$tag' does not look like vMAJOR.MINOR.PATCH"
            exit 1
          fi
          source_repo="${INPUT_SOURCE_REPO:-}"
          [ -z "$source_repo" ] && source_repo="$DEFAULT_REPO"
          # Only ingest releases from repos under the same owner so the
          # workflow can't be pointed at an arbitrary third-party release.
          owner="${DEFAULT_REPO%%/*}"
          case "$source_repo" in
            "$owner"/*) : ;;
            *) echo "::error::source_repo '$source_repo' must be under the '$owner' owner."; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "source_repo=$source_repo" >> "$GITHUB_OUTPUT"
          echo "Publishing $tag from $source_repo"

      - name: Checkout main (for scripts/build-apt-repo.sh)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: src

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: pages
        continue-on-error: true

      - name: Bootstrap gh-pages if missing
        run: |
          set -eu
          if [ ! -d pages/.git ]; then
            mkdir -p pages
            cd pages
            git init -q -b gh-pages
            git remote add origin "https://github.com/${{ github.repository }}.git"
            : > .nojekyll
            git add .nojekyll
            git -c user.name=github-actions -c user.email=actions@github.com commit -q -m "bootstrap: orphan gh-pages branch"
          fi

      - name: Verify release is not draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          SOURCE_REPO: ${{ steps.tag.outputs.source_repo }}
        run: |
          set -eu
          is_draft="$(gh release view "$TAG" --repo "$SOURCE_REPO" --json isDraft --jq .isDraft)"
          if [ "$is_draft" = "true" ]; then
            echo "::error::Release $TAG is still a draft; refusing to publish APT repo."
            exit 1
          fi

      - name: Download .deb assets from the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          SOURCE_REPO: ${{ steps.tag.outputs.source_repo }}
        # Retry on transient asset-visibility lag: when publish-apt is
        # dispatched immediately after the upstream `publish.yml` finishes
        # uploading, GitHub's release-asset listing API can briefly return
        # an empty / partial set before the assets are visible.
        # `gh release download --pattern '*.deb'` exits 0 with no files
        # in that empty-listing window, so the retry condition has to
        # check that at least one .deb was actually downloaded, not just
        # that the gh command exited cleanly.
        run: |
          set -eu
          mkdir -p debs
          attempts=0
          max_attempts=6
          while :; do
            attempts=$((attempts + 1))
            rm -f debs/*.deb 2>/dev/null || true
            if gh release download "$TAG" \
                 --repo "$SOURCE_REPO" \
                 --pattern '*.deb' \
                 --dir debs \
               && ls debs/*.deb >/dev/null 2>&1; then
              break
            fi
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "::error::Failed to download .deb assets for $TAG after $max_attempts attempts."
              exit 1
            fi
            echo "Download attempt $attempts produced no .deb assets; retrying in 10s…"
            sleep 10
          done
          ls -lh debs

      - name: Install apt-utils + gnupg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends apt-utils gnupg

      - name: Import signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
          APT_SIGNING_KEY_PASSPHRASE: ${{ secrets.APT_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -eu
          if [ -z "${APT_SIGNING_KEY:-}" ]; then
            echo "::error::APT_SIGNING_KEY secret is not set. Configure it in the production-apt environment."
            exit 1
          fi
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          # `gpg --import` returns 2 even on a successful import if it emits
          # any diagnostic (the "invalid armor header" line that appears when
          # GitHub Actions masks the secret in the input stream is benign).
          # Tolerate that exit code and verify success by listing the
          # resulting secret key instead.
          set +e
          printf '%s' "$APT_SIGNING_KEY" | gpg --batch --import
          import_rc=$?
          set -e
          fpr="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -z "$fpr" ]; then
            echo "::error::No secret key was imported (gpg --import exit=$import_rc)."
            exit 1
          fi
          echo "Imported signing key $fpr (gpg --import exit=$import_rc)"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "APT_SIGNING_KEY_FPR=$fpr" >> "$GITHUB_ENV"

      - name: Build APT repo
        env:
          APT_SIGNING_KEY_PASSPHRASE: ${{ secrets.APT_SIGNING_KEY_PASSPHRASE }}
        run: |
          set -eu
          # amd64 is added so the operator CLI's x86_64 .debs (published into
          # this shared repo from the sibling repo) get an index; the booth
          # itself ships only arm64/armhf, so its amd64 index stays empty.
          src/scripts/build-apt-repo.sh \
            --pages-dir pages \
            --debs-dir debs \
            --arch amd64 \
            --signing-key-fpr "$APT_SIGNING_KEY_FPR" \
            --pubkey-output pages/telephone-booth-archive-keyring.gpg

      - name: Commit + push gh-pages
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SOURCE_REPO: ${{ steps.tag.outputs.source_repo }}
        working-directory: pages
        run: |
          set -eu
          # Use the project signing key fingerprint as part of the commit
          # message so it's easy to audit which key produced which state.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to gh-pages; nothing to push."
            exit 0
          fi
          git commit -m "publish: $TAG from $SOURCE_REPO (signing-key $APT_SIGNING_KEY_FPR)"
          remote="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # First push may need -u if the branch was bootstrapped above.
          git push "$remote" HEAD:gh-pages
