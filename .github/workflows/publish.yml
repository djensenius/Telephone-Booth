name: publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if it does not exist."
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft?"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  # Serialize per release tag, regardless of whether we got here via a
  # tag push (github.ref_name = "vX.Y.Z") or a workflow_dispatch with an
  # explicit `tag` input. Without this, a manual dispatch run keyed by
  # `refs/heads/main` would race with a tag-push run keyed by
  # `refs/tags/vX.Y.Z` for the same artifacts.
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve release inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      draft: ${{ steps.derive.outputs.draft }}
    steps:
      - id: derive
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRAFT: ${{ inputs.draft }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "draft=${INPUT_DRAFT:-true}" >> "$GITHUB_OUTPUT"
          fi

  build-deb:
    name: build .deb (${{ matrix.target }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: publish-${{ matrix.target }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cross,cargo-deb
      - name: Cross-build release
        run: cross build -p booth-bin --release --target ${{ matrix.target }} --features pi,systemd,simulator,mock --no-default-features
      - name: Verify keyring file is present
        run: |
          set -eu
          path=packaging/debian/telephone-booth-archive-keyring.gpg
          if [ ! -s "$path" ]; then
            echo "::error::$path is missing or empty; .deb cannot bootstrap APT trust."
            exit 1
          fi
          # Best-effort fingerprint dump for the build log so a wrong key is
          # easy to spot in CI output.
          if command -v gpg >/dev/null 2>&1; then
            tmpdir="$(mktemp -d)"
            export GNUPGHOME="$tmpdir"
            chmod 700 "$tmpdir"
            gpg --batch --show-keys "$path" || true
            rm -rf "$tmpdir"
          fi
      - name: Build .deb
        # --no-strip: the release profile already strips via the Rust
        # linker; running cargo-deb's host `strip` on a cross-compiled
        # aarch64/armv7 binary fails because the host strip is x86_64.
        run: cargo deb -p booth-bin --no-build --no-strip --target ${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: telephone-booth-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb

  build-tarball:
    name: build tarball (${{ matrix.target }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo build -p booth-bin --release --target ${{ matrix.target }}
      - name: Pack tarball
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/telephone-booth-${{ matrix.target }}.tar.gz \
              telephone-booth
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: telephone-booth-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    needs: [resolve, build-deb, build-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -lh release/
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          draft: ${{ needs.resolve.outputs.draft == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*

  dispatch-apt:
    name: dispatch APT publish
    needs: [resolve, release]
    runs-on: ubuntu-latest
    # Don't refresh the public APT repo for draft releases — wait for the
    # human to publish the draft and trigger publish-apt manually if needed.
    if: ${{ needs.resolve.outputs.draft != 'true' }}
    permissions:
      actions: write
    steps:
      - name: Dispatch publish-apt workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          REPO: ${{ github.repository }}
        # The downstream `publish-apt` workflow is always dispatched against
        # `main` so it runs against the default-branch-pinned scripts and
        # satisfies the `production-apt` GitHub Environment's branch
        # restriction. After dispatch, we poll the workflow API to confirm
        # a fresh run was actually created — otherwise a transient API
        # failure here could silently break the chain just like the
        # removed `workflow_run` trigger used to.
        run: |
          set -eu
          echo "publish succeeded for $TAG; dispatching publish-apt.yml on main"
          # Capture the current most-recent publish-apt run ID so we can
          # detect the new one. `gh run list` is sorted newest-first.
          previous_id="$(gh run list \
            --repo "$REPO" \
            --workflow publish-apt.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')"
          echo "previous publish-apt run id: $previous_id"

          gh workflow run publish-apt.yml \
            --repo "$REPO" \
            --ref main \
            -f "tag=$TAG"

          # Poll for the new run. GitHub takes a few seconds to register
          # the dispatch; give it up to 60 seconds.
          new_id=""
          for _ in $(seq 1 30); do
            sleep 2
            candidate="$(gh run list \
              --repo "$REPO" \
              --workflow publish-apt.yml \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')"
            if [ "$candidate" != "$previous_id" ] && [ "$candidate" != "0" ]; then
              new_id="$candidate"
              break
            fi
          done

          if [ -z "$new_id" ]; then
            echo "::error::publish-apt.yml did not register a new run within 60s."
            echo "::error::Recover with: gh workflow run publish-apt.yml --ref main -f tag=$TAG"
            exit 1
          fi
          echo "publish-apt.yml run dispatched: id=$new_id"
          echo "::notice::publish-apt run $new_id dispatched for $TAG"
