name: publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if it does not exist."
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft?"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve release inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      draft: ${{ steps.derive.outputs.draft }}
    steps:
      - id: derive
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRAFT: ${{ inputs.draft }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "draft=${INPUT_DRAFT:-true}" >> "$GITHUB_OUTPUT"
          fi

  build-deb:
    name: build .deb (${{ matrix.target }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: publish-${{ matrix.target }}
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2
        with:
          tool: cross,cargo-deb
      - name: Cross-build release
        run: cross build -p booth-bin --release --target ${{ matrix.target }} --features pi,systemd --no-default-features
      - name: Override keyring with production public key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          if [ -z "${APT_SIGNING_KEY:-}" ]; then
            echo "::warning::APT_SIGNING_KEY is not set; .deb will ship the in-repo placeholder pubkey. Signed Release files will NOT verify on Pis."
            exit 0
          fi
          tmpdir="$(mktemp -d)"
          export GNUPGHOME="$tmpdir"
          chmod 700 "$tmpdir"
          printf '%s' "$APT_SIGNING_KEY" | gpg --batch --import
          fpr="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          gpg --batch --export "$fpr" > packaging/debian/telephone-booth-archive-keyring.gpg
          echo "Replaced keyring with pubkey for $fpr"
          rm -rf "$tmpdir"
      - name: Build .deb
        run: cargo deb -p booth-bin --no-build --target ${{ matrix.target }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: telephone-booth-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb

  build-tarball:
    name: build tarball (${{ matrix.target }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build -p booth-bin --release --target ${{ matrix.target }}
      - name: Pack tarball
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/telephone-booth-${{ matrix.target }}.tar.gz \
              telephone-booth
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: telephone-booth-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    needs: [resolve, build-deb, build-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -lh release/
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          draft: ${{ needs.resolve.outputs.draft == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
