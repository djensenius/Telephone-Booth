name: publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if it does not exist."
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft?"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-deb:
    name: build .deb (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cross,cargo-deb
      - name: Cross-build release
        run: cross build -p booth-bin --release --target ${{ matrix.target }} --features pi --no-default-features
      - name: Build .deb
        run: cargo deb -p booth-bin --no-build --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: telephone-booth-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb

  build-tarball:
    name: build tarball (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p booth-bin --release --target ${{ matrix.target }}
      - name: Pack tarball
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release \
              -czf dist/telephone-booth-${{ matrix.target }}.tar.gz \
              telephone-booth
      - uses: actions/upload-artifact@v4
        with:
          name: telephone-booth-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    needs: [build-deb, build-tarball]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -lh release/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: release/*
