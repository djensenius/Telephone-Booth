name: release-please
# Maintains an open Release PR that proposes the next semver bump + CHANGELOG
# entry from accumulated Conventional Commits on `main`. Merging the Release
# PR creates the tag and the GitHub Release, which in turn fires
# `publish.yml` (push: tags) to build the .deb + tarball artifacts, then
# `publish-apt.yml` to refresh the gh-pages APT repository.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
