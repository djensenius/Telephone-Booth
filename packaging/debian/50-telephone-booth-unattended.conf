// Telephone-Booth unattended-upgrades drop-in.
//
// This file teaches unattended-upgrades (when installed) to pull
// telephone-booth upgrades from the project's GitHub Pages APT repository.
// It is registered as a dpkg conffile, so local edits survive upgrades.
//
// Disable automatic upgrades from this repo by commenting out the
// Origins-Pattern entry below, or by stopping the
// `unattended-upgrades.service` systemd unit.

Unattended-Upgrade::Origins-Pattern {
        "origin=Telephone-Booth,label=Telephone-Booth,codename=stable,component=main";
};
