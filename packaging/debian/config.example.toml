[gpio]
hook_bcm = 17
rotary_pulse_bcm = 27
rotary_gate_bcm = 22
pull = "up"
debounce_ms = 25
invert.hook = false
invert.rotary_pulse = true
invert.rotary_gate = false

[audio]
device_substring = "Focusrite"
sample_rate_hz = 48000
channels = 1
max_recording_secs = 60
recordings_dir = "/var/lib/phone-booth/recordings"

[operator]
base_url = "https://operator.example.com"
token = "replace-with-operator-token"
status_topic = "booth-1"
http_timeout_secs = 10
ws_reconnect_initial_ms = 500
ws_reconnect_max_ms = 30000

[debug]
tailscale_enabled = true
# LAN fallback is disabled by default for security. Enable explicitly and
# ensure a strong token (≥16 chars) is set before binding to a non-loopback
# address.
lan_enabled = false
lan_bind = "127.0.0.1:8443"
loopback_bind = "127.0.0.1:8080"
allow_controls = false
ring_buffer_capacity = 4096
loopback_skip_auth = false

[telemetry]
journal_level = "info"

[runtime]
# Autostart mode for the systemd unit. Both default to false (real Pi adapters,
# no TUI). Setting either to true requires the binary to be built with the
# matching Cargo feature; the published .deb includes both.
#
# CLI flags (--mock, --simulator) can force a mode on at launch but cannot
# force it off — this file is the autostart source of truth.
#
# simulator = true requires a TTY for the TUI and will NOT work under the
# default telephone-booth.service unit without a systemd override that
# allocates one (TTYPath= + StandardInput=tty + StandardOutput=tty).
mock = false
simulator = false
